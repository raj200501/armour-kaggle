name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run trace-compliance acceptance suite
        run: bash examples/harbor_trace_compliance/tests/test.sh
